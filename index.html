// ═══ 1RM + PROGRESSION ═══
function epley(w,r){ return r===1?w:w*(1+r/30); }
function brzycki(w,r){ return r>=37?w:w/(1.0278-0.0278*r); }
function est1RM(w,r){ return (epley(w,r)+brzycki(w,r))/2; }
const round25 = v => Math.round(v/2.5)*2.5;

function getProgression(exId, exDef, history){
  if(!history||!history.length) return null;
  const sessions = history.map(w=>(w.exercises||[]).find(e=>e.id===exId)).filter(e=>e&&e.loggedSets&&e.loggedSets.length>0);
  if(!sessions.length) return null;
  const last = sessions[sessions.length-1];
  const lastWeight = (last.loggedSets[last.loggedSets.length-1]||{}).weight||0;
  const targetReps = exDef.reps, repMax = exDef.repMax||targetReps+3;
  const totalSets = last.loggedSets.length, inc = exDef.inc==null?5:exDef.inc;
  const setsNeeded = exDef.pSets||exDef.sets;
  const isBW = inc===0;

  if(isBW){
    const setsAtUpper = last.loggedSets.filter(s=>s.reps>=repMax).length;
    const setsOnTarget = last.loggedSets.filter(s=>s.reps>=targetReps).length;
    const bestReps = Math.max.apply(null,last.loggedSets.map(s=>s.reps||0));
    let status,advice,citation,nextReps;
    if(setsAtUpper===totalSets&&totalSets>=setsNeeded){status='ADD_LOAD';nextReps=repMax;advice='All sets at '+repMax+'+ reps — add external load (weight vest / plate)';citation='Plotkin et al. 2022 · ACSM 2009';}
    else if(setsOnTarget>=Math.ceil(totalSets*0.75)){status='REP_PROG';nextReps=Math.min(repMax,bestReps+1);advice='Push toward '+repMax+' reps per set before adding load';citation='Plotkin et al. 2022';}
    else{status='REP_HOLD';nextReps=targetReps;advice="Match last session's reps — build consistency first";citation='Zourdos et al. 2016';}
    const recentBest = sessions.slice(-3).map(s=>Math.max.apply(null,(s.loggedSets||[]).map(x=>x.reps)||[0]));
    let trend='FIRST SESSION';
    if(recentBest.length>=2){const d=recentBest[recentBest.length-1]-recentBest[0];trend=d>0?'IMPROVING':d===0?'STALLING':'PLATEAU';}
    else if(sessions.length===1)trend='BASELINE';
    return {isBodyweight:true,status,advice,citation,nextReps,nextWeight:null,est1RM:null,trend,sessions:sessions.length};
  }

  const oneRMs = last.loggedSets.filter(s=>s.weight>0&&s.reps>0).map(s=>est1RM(s.weight,s.reps));
  const avgRM = oneRMs.length?Math.round(oneRMs.reduce((a,v)=>a+v,0)/oneRMs.length):null;
  const setsAtUpper = last.loggedSets.filter(s=>s.reps>=repMax).length;
  const setsOnTarget = last.loggedSets.filter(s=>s.reps>=targetReps).length;
  const bestLastReps = Math.max.apply(null,last.loggedSets.map(s=>s.reps||0));
  let nextWeight,nextReps,status,advice,citation;
  if(setsAtUpper===totalSets&&totalSets>=setsNeeded){nextWeight=round25(lastWeight+inc);nextReps=targetReps;status='PROGRESS';advice='All sets ≥'+repMax+' reps — ready to add '+inc+' lbs';citation='Plotkin et al. 2022 · ACSM 2009';}
  else if(setsOnTarget>=Math.ceil(totalSets*0.75)){nextWeight=lastWeight;nextReps=Math.min(repMax,bestLastReps+1);status='HOLD';advice='Accumulate reps toward '+repMax+' before adding load';citation='Plotkin et al. 2022';}
  else if(setsOnTarget>=Math.ceil(totalSets*0.50)){nextWeight=lastWeight;nextReps=bestLastReps;status='HOLD';advice="Building rep consistency — match last session's reps";citation='Zourdos et al. 2016';}
  else{nextWeight=round25(Math.max(lastWeight-inc,0));nextReps=targetReps;status='DELOAD';advice='Reps fell short — reduce load to restore quality';citation='Helms et al. 2018 · Kraemer & Ratamess 2004';}
  const recentRMs = sessions.slice(-3).map(s=>{const ss=(s.loggedSets||[]).filter(x=>x.weight>0&&x.reps>0);return ss.length?ss.reduce((a,x)=>a+est1RM(x.weight,x.reps),0)/ss.length:null;}).filter(x=>x!=null);
  let trend='FIRST SESSION';
  if(recentRMs.length>=2){const pct=((recentRMs[recentRMs.length-1]-recentRMs[0])/recentRMs[0])*100;trend=pct>2?'IMPROVING':pct>0?'STALLING':'PLATEAU';}
  else if(sessions.length===1)trend='BASELINE';
  return {isBodyweight:false,nextWeight,nextReps,status,advice,citation,est1RM:avgRM,trend,sessions:sessions.length};
}

// ═══ GENERATION ═══
const pickOne = a => a.length?a[Math.floor(Math.random()*a.length)]:null;
function pickN(a,n){const c=a.slice(),o=[];while(o.length<n&&c.length)o.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);return o;}
const hasEq=(ex,eq)=>ex.eq.length===0||ex.eq.every(e=>eq.includes(e));
const fmtT=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
const fmtDate=d=>new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

function genWorkout(dur,target,equip){
  equip=equip.filter(x=>x!=='none_fixture');
  const n=Math.max(3,{30:3,45:4,60:5}[dur]||5);
  const all=DB.filter(e=>hasEq(e,equip));
  if(target==='recovery') return toWkt(pickN(all.filter(e=>e.type==='recovery'),n+1),dur,target);
  const pool=all.filter(e=>e.type!=='recovery'&&(target==='full'||e.muscles.some(m=>m===target||m==='full')));
  const sel=[];
  const add=src=>{const p=pickOne(src.filter(e=>!sel.find(s=>s&&s.id===e.id)));if(p)sel.push(p);};
  if(target==='upper'){add(pool.filter(e=>e.type==='compound'&&e.tags.includes('push')));add(pool.filter(e=>e.type==='compound'&&e.tags.includes('pull')));for(let i=0;sel.length<n&&i<14;i++)add(pool.filter(e=>e.type==='accessory'&&e.tags.includes(i%2===0?'pull':'push')));}

function h(tag, attrs, children){

    if(k==='style') el.style.cssText=attrs[k];
    else if(k==='class') el.className=attrs[k];
    else if(k.slice(0,2)==='on') el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);

function logSet(){

function startRest(sec){

}

function attachSwipe(container,inner,id){
  const W=82,TH=46; let startX=0,startOff=0,offset=0,dragging=false;
  const isOpen=()=>state.histOpen===id;
  if(isOpen()){ inner.style.transform='translateX(-'+W+'px)'; offset=-W; }
  const setX=(x,anim)=>{ inner.style.transition=anim?'transform .22s cubic-bezier(.25,1,.5,1)':'none'; inner.style.transform='translateX('+x+'px)'; offset=x; };
  const snap=()=>{ if(offset<-TH){setX(-W,true);state.histOpen=id;} else {setX(0,true);if(isOpen())state.histOpen=null;} };
  container.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startOff=isOpen()?-W:0;inner.style.transition='none';},{passive:true});
  container.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-startX;setX(Math.max(-W,Math.min(0,startOff+dx)),false);},{passive:true});
  container.addEventListener('touchend',()=>snap());
  container.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startOff=isOpen()?-W:0;inner.style.transition='none';});
  window.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-startX;setX(Math.max(-W,Math.min(0,startOff+dx)),false);});
  window.addEventListener('mouseup',()=>{if(!dragging)return;dragging=false;snap();});
}

function deleteWorkout(idx){

function showToast(type,text){ state.toast={type,text}; render(); setTimeout(()=>{if(state.toast&&state.toast.text===text){state.toast=null;if(state.screen==='history')render();}},3500); }
function csvCell(v){ v=(v==null?'':String(v)); return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function parseCSV(text){
  const rows=[]; let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; } else cell+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(cell);cell='';} else if(c==='\n'){row.push(cell);cell='';rows.push(row);row=[];} else if(c==='\r'){} else cell+=c; }
  }
  if(cell!==''||row.length){row.push(cell);rows.push(row);}
  return rows.filter(r=>!(r.length===1&&r[0]===''));
}

    (w.exercises||[]).forEach(ex=>{
      if(ex.loggedSets&&ex.loggedSets.length){
        ex.loggedSets.forEach((s,i)=>rows.push([wid,date,tgt,dur,el,ex.id,ex.name,i+1,s.weight,s.reps]));
      } else {
        rows.push([wid,date,tgt,dur,el,ex.id,ex.name,'','','']);
      }
    });
  });
  const csv=rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download='forge-backup-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('ok','Exported '+state.saved.length+' workout'+(state.saved.length>1?'s':''));
}
function handleImportFile(e){
  const file=e.target.files&&e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const rows=parseCSV(ev.target.result);
      if(rows.length<2) throw new Error('No rows found');
      const head=rows[0].map(s=>s.trim().toLowerCase());
      const ci=name=>head.indexOf(name);
      const need=['workout_id','date','exercise_id'];
      if(need.some(n=>ci(n)<0)) throw new Error('Missing required columns');
      const cW=ci('workout_id'),cD=ci('date'),cT=ci('target'),cDur=ci('duration_min'),cEl=ci('elapsed_sec'),cEi=ci('exercise_id'),cEn=ci('exercise_name'),cSn=ci('set_number'),cWt=ci('weight_lbs'),cR=ci('reps');
      const byW=new Map();
      rows.slice(1).forEach(r=>{
        const wid=r[cW]; if(wid==null||wid==='')return;
        if(!byW.has(wid)){
          byW.set(wid,{id:(/^\d+$/.test(wid)?Number(wid):wid),date:r[cD]||new Date().toISOString(),config:{dur:Number(r[cDur])||60,target:r[cT]||'upper'},elapsed:Number(r[cEl])||0,exMap:new Map()});
        }
        const w=byW.get(wid), exId=r[cEi], exName=cEn>=0?r[cEn]:'';
        if(!exId)return;
        if(!w.exMap.has(exId)){
          const def=getExDef({id:exId});
          w.exMap.set(exId,Object.assign({},def,{id:exId,name:exName||def.name||exId,pSets:def.sets||3,pReps:def.reps||8,loggedSets:[]}));
        }
        const sn=cSn>=0?r[cSn]:'', rep=cR>=0?r[cR]:'';
        if(sn!==''&&rep!==''){ w.exMap.get(exId).loggedSets.push({weight:parseFloat(r[cWt])||0,reps:parseInt(rep)||0,ts:Date.now()}); }
      });
      const valid=Array.from(byW.values()).map(w=>({id:w.id,date:w.date,config:w.config,elapsed:w.elapsed,exercises:Array.from(w.exMap.values())}));
      if(!valid.length) throw new Error('No valid workouts found');
      const byId=new Map();
      state.saved.concat(valid).forEach(w=>{const k=w.id||JSON.stringify(w.date);byId.set(k,w);});
      state.saved=Array.from(byId.values()).sort((a,b)=>new Date(a.date)-new Date(b.date));
      persist();
      showToast('ok','Imported '+valid.length+' workout'+(valid.length>1?'s':''));
    }catch(err){ showToast('err','Import failed: '+err.message); }
  };
  reader.readAsText(file); e.target.value='';
}

render();
